<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Calculadora Média</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <h2>Praticando Calculadora média</h2>
    <form action="destino_media.php" method="POST" class="col-4 mt-3">
      <div class="mb-3">
        <label>Nota 1:</label>
        <input
          type="number"
          name="n1"
          class="form-control"
          min="0"
          max="10"
          step="0.5"
          required
        />
      </div>
      <div class="mb-3">
        <label>Nota 2:</label>
        <input
          type="number"
          name="n2"
          class="form-control"
          min="0"
          max="10"
          step="0.5"
          required
        />
      </div>
      <div class="mb-3">
        <label>Nota 3:</label>
        <input
          type="number"
          name="n3"
          class="form-control"
          min="0"
          max="10"
          step="0.5"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary">Calcular média</button>
      <button type="reset" class="btn btn-warning">Limpar</button>
    </form>
  </body>
</html>
