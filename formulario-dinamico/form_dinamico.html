<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário Dinâmico</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <h2 class="my-3">Formulário</h2>
    <hr class="mb-4" />

    <form action="destino_dinamico.php" method="POST" class="row g-3">
      <div class="col-12">
        <label class="form-label">Título da página:</label>
        <input type="text" name="titulo" class="form-control" required />
      </div>

      <div class="col-12">
        <label class="form-label">Corpo:</label>
        <textarea
          name="corpo"
          class="form-control"
          rows="5"
          required
        ></textarea>
      </div>

      <div class="col-md-6">
        <label class="form-label">Cor texto:</label>
        <input
          type="color"
          name="corTexto"
          class="form-control form-control-color"
          value="#000000"
        />
      </div>

      <div class="col-md-6">
        <label class="form-label">Cor de plano de fundo da página:</label>
        <input
          type="color"
          name="corFundo"
          class="form-control form-control-color"
          value="#ffffff"
        />
      </div>

      <div class="col-12">
        <label class="form-label">URL de uma imagem:</label>
        <input type="url" name="urlImagem" class="form-control" />
      </div>

      <div class="col-12">
        <label class="form-label">URL de link:</label>
        <input type="url" name="urlLink" class="form-control" />
      </div>

      <div class="col-12 mt-4">
        <button type="submit" class="btn btn-primary">Enviar</button>
        <button type="reset" class="btn btn-warning">Limpar</button>
      </div>
    </form>
  </body>
</html>
